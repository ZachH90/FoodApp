<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page page-category">
  <main class="shell shell-category">
    <section class="card category-panel">
      <h1 class="title">Select a Category</h1>

      <div class="category-container">
        <img src="img/logodesign.png" alt="Category page" class="background-image">

        <div class="button-grid" aria-label="Food categories">
          <button class="button app" onclick="handleCategorySelection('App')">App</button>
          <button class="button soup" onclick="handleCategorySelection('Soup')">Soup</button>
          <button class="button salad" onclick="handleCategorySelection('Salad')">Salad</button>
          <button class="button entree" onclick="handleCategorySelection('Entree')">Entree</button>
          <button class="button sandwich" onclick="handleCategorySelection('Sandwich')">Sandwich</button>
          <button class="button dessert" onclick="handleCategorySelection('Dessert')">Dessert</button>
          <button class="button nopref" id="anyCategory">Anything</button>
        </div>

        <div class="results-box">
          <h2>Recommendations</h2>
          <ul id="resultsList">
            <li>Your food choices will appear here</li>
          </ul>
        </div>
      </div>

      <a href="index.html" class="btn btn-outline">Back</a>
    </section>

    <footer class="app-footer">© 2026 ImHungry App. All rights reserved.</footer>
  </main>

  <script>
    const categoryData = {
      App: ["Bruschetta", "Mozzarella Sticks", "Loaded Nachos"],
      Soup: ["Tomato Basil Soup", "Chicken Noodle Soup", "Miso Soup"],
      Salad: ["Greek Salad", "Caesar Salad", "Garden Salad"],
      Entree: ["Grilled Salmon", "Steak Bowl", "Pasta Primavera"],
      Sandwich: ["Club Sandwich", "Chicken Panini", "Veggie Wrap"],
      Dessert: ["Cheesecake", "Chocolate Lava Cake", "Fruit Tart"]
    };

    function renderResults(items) {
      const resultsList = document.getElementById("resultsList");
      resultsList.innerHTML = "";

      items.forEach((item) => {
        const listItem = document.createElement("li");
        listItem.textContent = item;
        resultsList.appendChild(listItem);
      });
    }

    function handleCategorySelection(category) {
      const picks = categoryData[category] || ["No recommendations found"]; 
      renderResults(picks);
    }

    document.getElementById("anyCategory").addEventListener("click", () => {
      const allPicks = Object.values(categoryData).flat();
      const shuffled = allPicks.sort(() => Math.random() - 0.5).slice(0, 3);
      renderResults(shuffled);
    });
  </script>
</body>
</html>
